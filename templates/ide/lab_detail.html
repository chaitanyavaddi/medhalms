{% load static %}
<div class="ide-detail-inner" id="ide-detail-inner" data-lab-id="{{ lab.id }}" data-save-url="{% url 'ide:lab_save' lab.id %}">
  <div class="ide-toolbar">
    <span class="ide-lang-badge">
      <img src="https://img.logo.dev/{{ lab.logo_domain }}?token={{ LOGO_DEV_TOKEN }}&retina=true" class="ide-lang-badge-icon" alt="{{ lab.language }}" onerror="this.style.display='none'">
      <span>{{ lab.name }}</span>
    </span>
    <div class="ide-toolbar-actions">
      <span class="ide-save-status" id="ide-save-status"></span>
      <button type="button" class="ide-run-btn" id="ide-run-btn">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Run
      </button>
      <button type="button" class="ide-delete-btn" onclick="showIdeDeleteConfirm()">Delete</button>
    </div>
  </div>
  <div class="ide-frame-wrap">
    <div class="ide-frame-loader" id="ide-frame-loader">
      <svg class="ide-spinner" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.22-8.56"/></svg>
      <span>Loading editor…</span>
    </div>
    <iframe src="{{ embed_url }}" class="ide-frame" id="ide-frame" allow="clipboard-write" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe>
  </div>
</div>

<div class="ide-confirm-backdrop" id="ide-confirm-backdrop" hidden onclick="if(event.target===this)hideIdeDeleteConfirm()">
  <div class="ide-confirm-modal">
    <p class="ide-confirm-title">Delete <strong>{{ lab.name }}</strong>?</p>
    <p class="ide-confirm-sub">This action cannot be undone.</p>
    <div class="ide-confirm-actions">
      <button type="button" class="ide-confirm-cancel" onclick="hideIdeDeleteConfirm()">Cancel</button>
      <button type="button" class="ide-confirm-delete" onclick="document.getElementById('ide-delete-form').submit()">Delete</button>
    </div>
  </div>
</div>
<form method="post" action="{% url 'ide:lab_delete' lab.id %}" id="ide-delete-form" style="display:none">{% csrf_token %}</form>

{% if lab.files %}{{ lab.files|json_script:"lab-code-data" }}{% endif %}
<script>
(function () {
  var ctrl = new AbortController();
  var sig = ctrl.signal;

  document.addEventListener('htmx:beforeSwap', function (e) {
    if (e.detail && e.detail.target && e.detail.target.id === 'ide-detail') ctrl.abort();
  }, { signal: sig });

  var inner = document.getElementById('ide-detail-inner');
  var iframe = document.getElementById('ide-frame');
  if (!inner || !iframe) return;

  var saveUrl = inner.dataset.saveUrl;
  var saveTimer = null;

  function getCookie(name) {
    var m = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
    return m ? m.pop() : '';
  }

  function setSaveStatus(text, cls) {
    var el = document.getElementById('ide-save-status');
    if (!el) return;
    el.textContent = text;
    el.className = 'ide-save-status' + (cls ? ' ' + cls : '');
  }

  function autosave(files) {
    clearTimeout(saveTimer);
    setSaveStatus('');
    saveTimer = setTimeout(function () {
      setSaveStatus('Saving…', 'is-saving');
      fetch(saveUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
        body: JSON.stringify({ files: files }),
      }).then(function () {
        setSaveStatus('Saved', 'is-saved');
      }).catch(function () {
        setSaveStatus('');
      });
    }, 1500);
  }

  var codeEl = document.getElementById('lab-code-data');
  var savedFiles = codeEl ? JSON.parse(codeEl.textContent) : null;

  function removeLoader() {
    var loader = document.getElementById('ide-frame-loader');
    if (loader) loader.remove();
  }

  iframe.addEventListener('load', function () {
    setTimeout(function () {
      if (savedFiles && savedFiles.length) {
        iframe.contentWindow.postMessage({
          eventType: 'populateCode',
          language: '{{ lab.oc_slug }}',
          files: savedFiles,
        }, '*');
      }
      // Reveal editor after injecting — user sees their code, not default
      setTimeout(removeLoader, 200);
    }, 200);
  }, { once: true, signal: sig });

  window.addEventListener('message', function (e) {
    if (!e.data || !e.data.language) return;
    var files = e.data.files || [];
    if (files.length) autosave(files);
  }, { signal: sig });

  var runBtn = document.getElementById('ide-run-btn');
  if (runBtn) runBtn.addEventListener('click', function () {
    iframe.contentWindow.postMessage({ eventType: 'triggerRun' }, '*');
  }, { signal: sig });
})();

function showIdeDeleteConfirm() {
  var el = document.getElementById('ide-confirm-backdrop');
  if (el) el.hidden = false;
}
function hideIdeDeleteConfirm() {
  var el = document.getElementById('ide-confirm-backdrop');
  if (el) el.hidden = true;
}
</script>
