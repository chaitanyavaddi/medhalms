<div id="delete-modal" style="display:none;position:fixed;inset:0;z-index:1000;align-items:center;justify-content:center;background:rgba(0,0,0,0.4);">
  <div style="background:#fff;border-radius:12px;padding:2rem;max-width:400px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.18);">
    <h3 id="modal-title-text" style="font-family:'Playfair Display',Georgia,serif;font-size:1.2rem;font-weight:600;color:#1a1a1a;margin:0 0 0.75rem;">Delete organization?</h3>
    <p id="modal-desc-text" style="font-size:0.875rem;color:#6b6b6b;margin:0 0 1.5rem;">This will permanently delete <strong>{{ request.org.name }}</strong> and all its data. This cannot be undone.</p>
    <div style="display:flex;gap:0.75rem;justify-content:flex-end;">
      <button id="modal-cancel-btn" type="button"
              style="padding:0.5rem 1rem;border:1px solid #e0ddd8;border-radius:7px;background:#fff;font-size:0.875rem;font-family:inherit;cursor:pointer;">
        Cancel
      </button>
      <button id="modal-confirm-btn" type="button"
              style="padding:0.5rem 1rem;border:none;border-radius:7px;background:#dc2626;color:#fff;font-size:0.875rem;font-family:inherit;font-weight:500;cursor:pointer;">
        <span class="modal-confirm-label">Yes, delete</span>
      </button>
    </div>
  </div>
</div>
