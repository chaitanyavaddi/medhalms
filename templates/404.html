{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; background: #fafafb; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .notfound-inner { text-align: center; padding: 2rem; }
    .notfound-code { font-family: 'Playfair Display', Georgia, serif; font-size: 5rem; font-weight: 600; color: #e0ddd8; line-height: 1; margin-bottom: 1rem; }
    .notfound-title { font-size: 1.5rem; font-weight: 600; color: #1a1a1a; margin-bottom: 0.5rem; }
    .notfound-desc { color: #6b6b6b; margin-bottom: 1.5rem; }
    .notfound-link { color: #3730a3; text-decoration: none; }
    .notfound-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="notfound-inner">
    <div class="notfound-code">404</div>
    <h1 class="notfound-title">Page not found</h1>
    <p class="notfound-desc">The page you're looking for doesn't exist or may have been moved.</p>
    <a href="/" class="notfound-link">← Go back home</a>
  </div>
</body>
</html>
