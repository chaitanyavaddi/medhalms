<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
</head>
<body style="margin:0;padding:0;background:#f5f4f0;font-family:'Inter',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f4f0;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;background:#ffffff;border-radius:12px;border:1px solid #e0ddd8;overflow:hidden;">
          <tr>
            <td style="padding:36px 40px 28px;">
              <div style="margin-bottom:24px;">
                <div style="display:inline-block;width:40px;height:40px;border-radius:10px;background:#ede9fe;line-height:40px;text-align:center;font-family:Georgia,serif;font-size:18px;color:{{ brand_color }};">A</div>
              </div>
              <h1 style="font-family:Georgia,serif;font-size:24px;font-weight:400;color:#1a1a1a;margin:0 0 12px;">Welcome aboard</h1>
              <p style="font-size:15px;color:#4b4b4b;line-height:1.6;margin:0 0 24px;">
                Your account has been created. You can now create your organization and start using the platform.
              </p>
              <a href="#" style="display:inline-block;background:{{ brand_color }};color:#fff;text-decoration:none;border-radius:7px;padding:10px 22px;font-size:14px;font-weight:500;">
                Get started
              </a>
            </td>
          </tr>
          <tr>
            <td style="padding:20px 40px;border-top:1px solid #e0ddd8;">
              <p style="font-size:12px;color:#9b9b9b;margin:0;">
                If you didn't create this account, you can ignore this email.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
