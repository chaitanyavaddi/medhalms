<form class="jb-save-form" hx-post="{% url 'jobs:save_toggle' job_id %}" hx-target="closest .jb-save-form" hx-swap="outerHTML">
  {% csrf_token %}
  <input type="hidden" name="title"   value="{{ title }}">
  <input type="hidden" name="company" value="{{ company }}">
  <button type="submit" class="jb-save-btn{% if is_saved %} is-saved{% endif %}" title="{% if is_saved %}Saved{% else %}Save for later{% endif %}">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="{% if is_saved %}currentColor{% else %}none{% endif %}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    {% if is_saved %}Saved{% else %}Save{% endif %}
  </button>
</form>
