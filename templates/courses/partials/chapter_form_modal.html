<div class="cr-modal-backdrop">
  <div class="cr-modal cr-modal--sm">
    <div class="cr-modal-header">
      <h3 class="cr-modal-title">{% if chapter_obj %}Rename Chapter{% else %}Add Chapter{% endif %}</h3>
      <button type="button" class="cr-modal-close"
              onclick="document.getElementById('cr-modal-slot').innerHTML=''">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    {% if error %}<div class="cr-form-error">{{ error }}</div>{% endif %}

    <form hx-post="{% if chapter_obj %}{% url 'courses:chapter_edit' course.pk module_obj.pk chapter_obj.pk %}{% else %}{% url 'courses:chapter_create' course.pk module_obj.pk %}{% endif %}"
          hx-target="#cr-modal-slot"
          hx-swap="innerHTML">
      {% csrf_token %}
      <div class="cr-form-field">
        <label>Chapter title <span style="color:#ef4444">*</span></label>
        <input type="text" name="title" value="{{ chapter_obj.title|default:'' }}"
               placeholder="e.g. Variables and Data Types" required autofocus>
      </div>
      <div class="cr-form-actions">
        <button type="button" class="cr-btn-secondary"
                onclick="document.getElementById('cr-modal-slot').innerHTML=''">Cancel</button>
        <button type="submit" class="cr-btn-primary">
          {% if chapter_obj %}Save{% else %}Add Chapter{% endif %}
        </button>
      </div>
    </form>
  </div>
</div>
